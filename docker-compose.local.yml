services:
  auth:
    build:
      context: .
      dockerfile: services/auth/Dockerfile
    ports:
      - "4400:4400"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://hive:hive@postgres:5432/hive
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - COOKIE_SECRET=${COOKIE_SECRET:-}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4400/health"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://hive:hive@postgres:5432/hive
      - REDIS_URL=redis://redis:6379
      - CODER_URL=${CODER_URL:-}
      - AUTH_SERVICE_URL=http://auth:4400
      - COOKIE_SECRET=${COOKIE_SECRET:-}
      - NEXT_PUBLIC_TERMINAL_WS_URL=${NEXT_PUBLIC_TERMINAL_WS_URL:-}

  terminal-proxy:
    build:
      context: .
      dockerfile: services/terminal-proxy/Dockerfile
    ports:
      - "3001:3001"
    depends_on:
      auth:
        condition: service_healthy
    environment:
      - AUTH_SERVICE_URL=http://auth:4400
      - COOKIE_SECRET=${COOKIE_SECRET:-}

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: hive
      POSTGRES_DB: hive
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hive"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
