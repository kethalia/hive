services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://hive:hive@postgres:5432/hive
      - REDIS_URL=redis://redis:6379
      - CODER_URL=${CODER_URL:-}
      - CODER_SESSION_TOKEN=${CODER_SESSION_TOKEN:-}
      - NEXT_PUBLIC_TERMINAL_WS_URL=${NEXT_PUBLIC_TERMINAL_WS_URL:-}

  terminal-proxy:
    build:
      context: .
      dockerfile: services/terminal-proxy/Dockerfile
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://hive:hive@postgres:5432/hive
      - CODER_URL=${CODER_URL:-}
      - CODER_AGENT_URL=${CODER_AGENT_URL:-}
      - CODER_SESSION_TOKEN=${CODER_SESSION_TOKEN:-}

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: hive
      POSTGRES_DB: hive
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hive"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
