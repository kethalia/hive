# Default values for hive-auth.
# Override per environment via the umbrella chart or `helm upgrade --set`.

replicaCount: 1

image:
  repository: ghcr.io/kethalia/hive-auth
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Optional: name of an externally-managed Secret providing DATABASE_URL,
# COOKIE_SECRET, ENCRYPTION_KEY. When empty, defaults to "<release-fullname>-secrets".
existingSecret: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001
  fsGroup: 1001
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 80
  targetPort: 4400

ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    - host: auth.hive.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

livenessProbe:
  httpGet:
    path: /health
    port: 4400
  initialDelaySeconds: 10
  periodSeconds: 30
  timeoutSeconds: 3
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: 4400
  initialDelaySeconds: 3
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

config:
  LOG_LEVEL: info
  CODER_URL: ""

nodeSelector: {}
tolerations: []
affinity: {}

volumes: []
volumeMounts: []
