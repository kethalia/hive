apiVersion: v2
name: hive
description: Umbrella Helm chart composing hive-web, hive-auth, and hive-terminal.
type: application
version: 0.3.0
appVersion: "0.1.0"
kubeVersion: ">=1.28.0-0"
home: https://github.com/kethalia/hive
sources:
  - https://github.com/kethalia/hive
keywords:
  - hive
  - umbrella
  - composition
maintainers:
  - name: kethalia
    url: https://github.com/kethalia
# Datastore subcharts were dropped at v0.2.0. Postgres is provisioned by
# the in-cluster CloudNativePG operator (CNPG `Cluster` CR rendered by
# templates/cnpg-cluster.yaml). Redis is replaced by Valkey, rendered as
# a StatefulSet by templates/valkey.yaml. The operator + CRDs are
# cluster-wide infra installed via the k8s-cluster repo
# (argocd/apps/cnpg-operator.yaml); this chart only renders Cluster CRs.
dependencies:
  - name: hive-web
    version: 0.1.0
    repository: "file://../hive-web"
    condition: hive-web.enabled
  - name: hive-auth
    version: 0.1.0
    repository: "file://../hive-auth"
    condition: hive-auth.enabled
  - name: hive-terminal
    version: 0.1.0
    repository: "file://../hive-terminal"
    condition: hive-terminal.enabled
