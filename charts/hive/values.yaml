# hive umbrella values.
#
# Datastore migration (v0.2.0):
#   - Postgres: CNPG `Cluster` CR rendered by templates/cnpg-cluster.yaml.
#     Cluster name is `<release>-pg`; the operator auto-generates an
#     application user Secret at `<release>-pg-app` with key `uri`.
#   - Redis  : Valkey StatefulSet + Secret rendered by templates/valkey.yaml.
#     Secret name is `<release>-valkey-secret`, key `url`.
#
# Children consume DATABASE_URL + REDIS_URL via their `extraEnv` value —
# each item becomes an env entry on the container with a `secretKeyRef`.
# The umbrella defaults below wire DATABASE_URL/REDIS_URL automatically;
# override `extraEnv` in a per-env file only if you need different keys.
#
# The `secretName` strings are `tpl`-rendered inside the child chart so
# they can interpolate `.Release.Name` (which is what `helm install` /
# the ApplicationSet binds per-PR).

hive-web:
  enabled: true
  existingSecret: hive-secrets
  config:
    CODER_WILDCARD_ACCESS_URL: "*.kethalia.com"
  extraEnv:
    - name: DATABASE_URL
      secretName: "{{ .Release.Name }}-pg-app"
      secretKey: uri
    - name: REDIS_URL
      secretName: "{{ .Release.Name }}-valkey-secret"
      secretKey: url

hive-auth:
  enabled: true
  existingSecret: hive-secrets
  extraEnv:
    - name: DATABASE_URL
      secretName: "{{ .Release.Name }}-pg-app"
      secretKey: uri

hive-terminal:
  enabled: true
  existingSecret: hive-secrets
  extraEnv:
    - name: DATABASE_URL
      secretName: "{{ .Release.Name }}-pg-app"
      secretKey: uri
    - name: REDIS_URL
      secretName: "{{ .Release.Name }}-valkey-secret"
      secretKey: url

# Prisma migrate Helm hook image. Rendered by templates/migrate-job.yaml,
# which runs `prisma migrate deploy` against the CNPG-managed Postgres
# before app pods roll. Built from services/migrate/Dockerfile in this
# repo and published as ghcr.io/kethalia/hive-migrate alongside the other
# images. Tag is pinned to :sha-<short> by k8s-cluster's values-prod.yaml.
hive-migrate:
  image:
    repository: ghcr.io/kethalia/hive-migrate
    tag: ""
    pullPolicy: IfNotPresent
  imagePullSecrets: []
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 512Mi

# Bounds the Argo CD Sync hook so a missing/broken PR image cannot leave the
# preview Application stuck in Running forever. Failed hooks are cleaned up by
# the hook delete policy in templates/migrate-job.yaml.
migrateJob:
  activeDeadlineSeconds: 900

# Stub application secrets composed into `<release>-secrets`. Children
# consume these via envFrom (existingSecret above). DATABASE_URL +
# REDIS_URL are NOT composed here — they come from the CNPG- and
# Valkey-owned Secrets via the `extraEnv` blocks above.
sharedSecret:
  COOKIE_SECRET: replace-me
  ENCRYPTION_KEY: replace-me-32-bytes-hex-for-aes256

# ─── CloudNativePG `Cluster` ────────────────────────────────────────────
# Preview defaults: single-instance, small PVC, no backups. Prod
# overrides in k8s-cluster/apps/kethalia/hive/values-prod.yaml.
cnpg:
  enabled: true
  # Operator 1.24.x supports PG 13–17. Pin to a digest in prod overrides
  # for reproducibility; the floating tag here is fine for preview.
  imageName: ghcr.io/cloudnative-pg/postgresql:17.2
  instances: 1
  database: hive
  owner: hive
  storage:
    size: 1Gi
    # Empty -> cluster default. Prod overrides to longhorn.
    storageClass: ""
  resources: {}
  # WAL archive + base backups to MinIO. Disabled for preview (no need
  # to flood the bucket with throwaway PR data). Enabled in prod via
  # values-prod.yaml. Credentials live in `cnpg-minio-credentials`,
  # Reflector-mirrored into this namespace by the k8s-cluster repo.
  backup:
    enabled: false
    endpointURL: http://minio.infrastructure.svc:9000
    destinationPath: "" # e.g. s3://cnpg-backups/hive
    s3CredentialsSecret: cnpg-minio-credentials
    schedule: "0 0 3 * * *" # ScheduledBackup cron — daily 03:00 UTC
    retentionPolicy: "14d"

# ─── Preview-only resources ────────────────────────────────────────────
# Stamps a per-PR cert-manager `Certificate` for `*.<preview.host>`
# (e.g. `*.pr-82.hive.local.kethalia.com`). The TLS Secret lives in the
# per-PR namespace alongside the Ingress that consumes it, so it's
# pruned automatically when the ApplicationSet reaps the Application.
# `preview.host` must equal the first-label parent under which the web
# (`<preview.host>`) and terminal (`terminal.<preview.host>`) hosts live.
# Disabled by default; the per-PR ApplicationSet flips this on.
preview:
  enabled: false
  host: ""
  issuerKind: ClusterIssuer
  issuerName: letsencrypt-prod

# ─── Valkey (Redis drop-in) ─────────────────────────────────────────────
# Single-replica StatefulSet. Password generated at install time when
# `auth.password` is empty; the rendered Secret is the source of truth
# for REDIS_URL (consumed by children via extraEnv).
valkey:
  enabled: true
  image: valkey/valkey:8.0-alpine
  # Empty -> random 32-byte password rendered into the Secret at install.
  # Prod overrides via SealedSecret-derived value (see values-prod).
  auth:
    password: ""
    # When set, the chart skips rendering its own Secret and reads
    # `url` (and optional `password`) from this external Secret.
    existingSecret: ""
  persistence:
    enabled: false
    size: 1Gi
    storageClass: ""
  resources: {}
