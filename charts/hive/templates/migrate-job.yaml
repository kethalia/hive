{{- /*
Prisma migrate Job. Runs `prisma migrate deploy` against the CNPG-managed
Postgres before app pods roll. Uses the dedicated `hive-migrate` image
built from services/migrate/Dockerfile — that image carries the Prisma
CLI plus the @hive/db schema and migrations, decoupled from the auth
runtime.

Hook strategy (ArgoCD-native, NOT Helm hooks):
  ArgoCD translates `helm.sh/hook: pre-upgrade` to PreSync regardless of
  whether the sync is a real upgrade or a first install — so a fresh
  preview namespace would run this Job before the Cluster CR is applied,
  deadlocking on `wait-for-postgres`. Use argocd.argoproj.io/hook=Sync
  with sync-wave ordering instead: the Cluster CR (wave -10) is applied
  first within the Sync phase, then this Job (wave -5) runs and migrates
  the schema, then all other resources (default wave 0) roll.

  BeforeHookCreation,HookSucceeded,HookFailed delete-policy keeps the Job
  cleaned up between runs and after failures so each sync re-runs migrations
  against the latest schema without leaving failed hooks behind.

DATABASE_URL is sourced from the CNPG-issued `<release>-pg-app` Secret (key
`uri`), the same Secret hive-auth/web/terminal consume.
*/ -}}
{{- if .Values.cnpg.enabled -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-prisma-migrate
  labels:
    {{- include "hive.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded,HookFailed
    argocd.argoproj.io/sync-wave: "-5"
spec:
  backoffLimit: 5
  activeDeadlineSeconds: {{ .Values.migrateJob.activeDeadlineSeconds | default 900 }}
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        {{- include "hive.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: prisma-migrate
    spec:
      restartPolicy: OnFailure
      {{- with (index .Values "hive-migrate").imagePullSecrets | default (index .Values "hive-auth").imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          command:
            - sh
            - -c
            - |
              set -e
              host="{{ .Release.Name }}-pg-rw"
              port=5432
              echo "Waiting for ${host}:${port} ..."
              for i in $(seq 1 60); do
                if nc -z -w 2 "${host}" "${port}"; then
                  echo "Postgres reachable."
                  exit 0
                fi
                echo "  attempt ${i}/60: not ready, sleeping 5s"
                sleep 5
              done
              echo "Postgres did not become reachable in time" >&2
              exit 1
      containers:
        - name: prisma-migrate
          image: "{{ (index .Values "hive-migrate").image.repository }}:{{ (index .Values "hive-migrate").image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ (index .Values "hive-migrate").image.pullPolicy | default "IfNotPresent" }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          # Command + schema path are baked into the image's CMD.
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-pg-app
                  key: uri
          resources:
            {{- toYaml (index .Values "hive-migrate").resources | nindent 12 }}
{{- end }}
