{{- /*
Shared application-secret for the umbrella stack.

Rendered name: `{{ include "hive.fullname" . }}-secrets`. With release
name `hive` (the convention this umbrella assumes), fullname collapses
to `hive`, so the Secret resolves to `hive-secrets` — which is the
literal each child's `existingSecret` value references.

Composition:
  - DATABASE_URL + REDIS_URL are NOT in this Secret. They come from
    CNPG's auto-generated `<release>-pg-app` Secret and our own
    `<release>-valkey-secret`, consumed by children via `extraEnv`.
  - Everything in `.Values.sharedSecret` (COOKIE_SECRET, ENCRYPTION_KEY,
    plus per-env additions in values-prod.yaml) is rendered as-is.

Gating: skipped entirely when `.Values.sharedSecret` is empty so prod
overlays that bring their own externally-managed Secret can disable
the stub without colliding.
*/ -}}
{{- if .Values.sharedSecret -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "hive.fullname" . }}-secrets
  labels:
    {{- include "hive.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $key, $value := .Values.sharedSecret }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
