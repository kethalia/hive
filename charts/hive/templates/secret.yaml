{{- /*
Shared Secret for the umbrella stack.

Renders DATABASE_URL + REDIS_URL composed from the bundled subchart auth
values, plus the application keys defined under .Values.sharedSecret. The
child charts (hive-web, hive-auth, hive-terminal) consume this Secret via
`envFrom` by setting their `existingSecret` value to the rendered name.

Naming contract: rendered name is `{{ include "hive.fullname" . }}-secrets`.
With release name `hive` (the convention assumed by this umbrella), the
fullname helper short-circuits to `hive`, so the Secret resolves to
`hive-secrets` — which is the literal each child's `existingSecret` references.

Gating: skipped entirely when both bundled datastores are disabled AND
no sharedSecret block is provided, so production overrides that bring
their own externally-managed Secret do not collide with a stub.
*/ -}}
{{- if or .Values.postgresql.enabled .Values.redis.enabled .Values.sharedSecret -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "hive.fullname" . }}-secrets
  labels:
    {{- include "hive.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.postgresql.enabled }}
  DATABASE_URL: "postgresql://{{ .Values.postgresql.auth.username }}:{{ .Values.postgresql.auth.password }}@{{ .Release.Name }}-postgresql:5432/{{ .Values.postgresql.auth.database }}"
  {{- end }}
  {{- if .Values.redis.enabled }}
  REDIS_URL: "redis://:{{ .Values.redis.auth.password }}@{{ .Release.Name }}-redis-master:6379"
  {{- end }}
  {{- with .Values.sharedSecret }}
  {{- range $key, $value := . }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- end }}
{{- end }}
