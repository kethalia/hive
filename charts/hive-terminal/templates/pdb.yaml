{{- if .Values.podDisruptionBudget.enabled -}}
{{- $minAvailable := .Values.podDisruptionBudget.minAvailable -}}
{{- $maxUnavailable := .Values.podDisruptionBudget.maxUnavailable -}}
{{- if and (ne (toString $minAvailable) "") (ne (toString $maxUnavailable) "") -}}
{{- fail "podDisruptionBudget.minAvailable and podDisruptionBudget.maxUnavailable are mutually exclusive" -}}
{{- end -}}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "hive-terminal.fullname" . }}
  labels:
    {{- include "hive-terminal.labels" . | nindent 4 }}
spec:
  {{- if ne (toString $minAvailable) "" }}
  minAvailable: {{ $minAvailable }}
  {{- else if ne (toString $maxUnavailable) "" }}
  maxUnavailable: {{ $maxUnavailable }}
  {{- else }}
  minAvailable: 1
  {{- end }}
  selector:
    matchLabels:
      {{- include "hive-terminal.selectorLabels" . | nindent 6 }}
{{- end }}
