# Default values for hive-terminal (WebSocket terminal proxy).
# Override per environment via the umbrella chart or `helm upgrade --set`.

replicaCount: 1

# Rollout safety defaults. Previews keep one replica but still fail fast on
# stuck rollouts; production can raise replica/autoscaling counts separately.
progressDeadlineSeconds: 600
rollingUpdate:
  maxUnavailable: 0
  maxSurge: 1

image:
  repository: ghcr.io/kethalia/hive-terminal
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Optional: name of an externally-managed Secret providing COOKIE_SECRET, etc.
existingSecret: ""

# Extra env vars wired to external Secrets via secretKeyRef. Used by
# the umbrella to inject DATABASE_URL + REDIS_URL from the CNPG- and
# Valkey-owned Secrets. `secretName` is `tpl`-rendered inside the
# deployment so it can interpolate .Release.Name.
extraEnv: []

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001
  fsGroup: 1001
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 80
  targetPort: 3001

ingress:
  enabled: false
  className: nginx
  annotations:
    # WebSocket terminations require long upstream timeouts on most ingress controllers.
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
  hosts:
    - host: terminal.hive.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Startup probe protects slower cold starts without weakening liveness/readiness
# after startup completes. TCP is appropriate for the WebSocket proxy.
startupProbe:
  tcpSocket:
    port: 3001
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 24

# WebSocket server — TCP probes are appropriate. Switch to httpGet if a
# /health route is added.
livenessProbe:
  tcpSocket:
    port: 3001
  initialDelaySeconds: 10
  periodSeconds: 30
  timeoutSeconds: 3
  failureThreshold: 3

readinessProbe:
  tcpSocket:
    port: 3001
  initialDelaySeconds: 3
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

# Disabled by default so preview/one-replica releases are not blocked during
# node drains. Enable in production only when replicas or minReplicas >= 2.
podDisruptionBudget:
  enabled: false
  # Default when enabled. To use maxUnavailable instead, set minAvailable: "".
  minAvailable: 1
  maxUnavailable: ""

config:
  LOG_LEVEL: info
  # Defaults to the in-cluster auth Service rendered by hive-auth (Release.Name = hive-auth).
  # Override when deployed under a different release (e.g. umbrella where the
  # Service renders as `<umbrella-release>-hive-auth`).
  AUTH_SERVICE_URL: "http://hive-auth"
  # Must match the web/Coder-agent absolute POSIX workspace home root string so clone terminals open
  # tmux sessions with cwd under the same repository tree inside the Coder agent.
  HIVE_PROJECTS_ROOT: "/home/coder"

nodeSelector: {}
tolerations: []
affinity: {}

volumes: []
volumeMounts: []

# Writable /tmp emptyDir, required when securityContext.readOnlyRootFilesystem is true
# (tsx transpile cache, Node.js os.tmpdir() callers). Disable to mount your own /tmp.
tmpVolume:
  enabled: true
