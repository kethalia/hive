# Default values for hive-terminal (WebSocket terminal proxy).
# Override per environment via the umbrella chart or `helm upgrade --set`.

replicaCount: 1

image:
  repository: ghcr.io/kethalia/hive-terminal
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Optional: name of an externally-managed Secret providing COOKIE_SECRET, etc.
existingSecret: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001
  fsGroup: 1001
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 80
  targetPort: 3001

ingress:
  enabled: false
  className: nginx
  annotations:
    # WebSocket terminations require long upstream timeouts on most ingress controllers.
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
  hosts:
    - host: terminal.hive.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# WebSocket server — TCP probes are appropriate. Switch to httpGet if a
# /health route is added.
livenessProbe:
  tcpSocket:
    port: 3001
  initialDelaySeconds: 10
  periodSeconds: 30
  timeoutSeconds: 3
  failureThreshold: 3

readinessProbe:
  tcpSocket:
    port: 3001
  initialDelaySeconds: 3
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

config:
  LOG_LEVEL: info
  AUTH_SERVICE_URL: ""

nodeSelector: {}
tolerations: []
affinity: {}

volumes: []
volumeMounts: []
