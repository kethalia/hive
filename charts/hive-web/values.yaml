# Default values for hive-web (Next.js orchestrator).
# Override per environment via the umbrella chart or `helm upgrade --set`.
#
# ─── NEXT_PUBLIC_* baking gotcha ─────────────────────────────────────────────
# Next.js inlines every `NEXT_PUBLIC_*` env var into the client bundle at
# `next build` time. Values under `config:` are surfaced via a ConfigMap and
# consumed at runtime via `envFrom`. Server-side reads pick them up; the
# browser sees whatever was baked into the image at build time. To change a
# NEXT_PUBLIC_* on the client, rebuild the image.
# ─────────────────────────────────────────────────────────────────────────────

replicaCount: 1

# Rollout safety defaults. Previews keep one replica but still fail fast on
# stuck rollouts; production can raise replica/autoscaling counts separately.
progressDeadlineSeconds: 600
rollingUpdate:
  maxUnavailable: 0
  maxSurge: 1

image:
  repository: ghcr.io/kethalia/hive-web
  # tag: empty -> falls back to .Chart.AppVersion in deployment.yaml.
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Optional: name of an externally-managed Secret providing DATABASE_URL,
# REDIS_URL, COOKIE_SECRET, etc. When empty, defaults to "<release-fullname>-secrets".
existingSecret: ""

# Extra env vars wired to external Secrets (rendered as `env:` entries
# with `valueFrom.secretKeyRef`). Used by the umbrella to inject
# DATABASE_URL from CNPG's `<release>-pg-app` Secret and REDIS_URL from
# the umbrella-rendered Valkey Secret. `secretName` is `tpl`-rendered
# inside the deployment so it can interpolate .Release.Name.
extraEnv: []
# - name: DATABASE_URL
#   secretName: "{{ .Release.Name }}-pg-app"
#   secretKey: uri

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001
  fsGroup: 1001
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    - host: hive.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# Optional second ingress for a public edge/tunnel whose origin policy differs
# from the private ingress (for example Cloudflare Tunnel over in-cluster HTTP).
publicIngress:
  enabled: false
  className: nginx
  annotations: {}
  hosts: []
  tls: []

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

# Startup probe protects slower cold starts without weakening liveness/readiness
# after startup completes. TCP is used until the web app exposes an unauthenticated
# HTTP health endpoint.
startupProbe:
  tcpSocket:
    port: 3000
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 24

# TCP probes — Next.js does not currently expose an unauthenticated HTTP
# health endpoint. Switch to httpGet once /api/health is added.
livenessProbe:
  tcpSocket:
    port: 3000
  initialDelaySeconds: 15
  periodSeconds: 30
  timeoutSeconds: 3
  failureThreshold: 3

readinessProbe:
  tcpSocket:
    port: 3000
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

# Disabled by default so preview/one-replica releases are not blocked during
# node drains. Enable in production only when replicas or minReplicas >= 2.
podDisruptionBudget:
  enabled: false
  # Default when enabled. To use maxUnavailable instead, set minAvailable: "".
  minAvailable: 1
  maxUnavailable: ""

# Non-secret configuration rendered into a ConfigMap and consumed via envFrom.
config:
  LOG_LEVEL: info
  # Defaults to the in-cluster auth Service rendered by hive-auth (Release.Name = hive-auth).
  # Override when deployed under a different release (e.g. umbrella where the
  # Service renders as `<umbrella-release>-hive-auth`).
  AUTH_SERVICE_URL: "http://hive-auth"
  CODER_URL: ""
  # Coder's configured wildcard app URL (for example `*.coder.example.com`).
  # Leave empty only when workspace apps live below the CODER_URL hostname.
  CODER_WILDCARD_ACCESS_URL: ""
  NEXT_PUBLIC_TERMINAL_WS_URL: ""
  # Absolute POSIX workspace home tree path used for Git clone discovery/sidebar scans.
  # The web service scans this path inside Coder workspaces via coder ssh.
  HIVE_PROJECTS_ROOT: "/home/coder"
  # Cookie Domain attribute applied to the session cookie. Set to a shared
  # parent (leading dot recommended) so the cookie is sent to sibling
  # subdomains like the terminal-proxy host (`*-hive-terminal.<domain>`).
  # Leave empty for host-only cookies (single-host or localhost setups).
  COOKIE_DOMAIN: ""

nodeSelector: {}
tolerations: []
affinity: {}

volumes: []
volumeMounts: []

# Writable /tmp emptyDir, required when securityContext.readOnlyRootFilesystem is true
# (Next.js scratch, Node.js os.tmpdir() callers). Disable to mount your own /tmp.
tmpVolume:
  enabled: true
