name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-lint-test:
    name: Build / Lint / Test
    permissions:
      contents: read
      pull-requests: write
    uses: kethalia/workflows/.github/workflows/ci-build-lint-test.yml@v4
    with:
      node-version: 22
      lint-command: pnpm lint
      format-command: pnpm format:check
      typecheck-command: ""
      test-command: ""
      build-command: |
        export DATABASE_URL=postgresql://dummy:dummy@localhost:5432/dummy
        export REDIS_URL=redis://localhost:6379
        export AUTH_SERVICE_URL=http://localhost:4400
        export COOKIE_SECRET=dummy
        export ENCRYPTION_KEY=00000000000000000000000000000000
        export NEXT_PUBLIC_TERMINAL_WS_URL=ws://localhost:3001
        pnpm build
        pnpm -r --if-present run typecheck
        pnpm test:coverage
        pnpm -r --if-present run test:coverage
      test-node-versions: '[22]'
      artifact-paths: .github/no-build-artifact
      build-cache-paths: .next/cache
    secrets: inherit

  quality:
    name: Quality
    permissions:
      contents: read
      pull-requests: read
    uses: kethalia/workflows/.github/workflows/ci-quality.yml@v4
    with:
      changeset-check: true
      audit-level: critical
    secrets: inherit

  helm-lint:
    name: Helm Lint
    uses: kethalia/workflows/.github/workflows/helm-lint.yml@v4
    with:
      charts: |
        charts/hive-web
        charts/hive-auth
        charts/hive-terminal
        charts/hive
    permissions:
      contents: read
