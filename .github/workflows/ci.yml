name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run tests
        run: pnpm -r test

  quality:
    name: Quality
    permissions:
      contents: read
      pull-requests: read
    uses: kethalia/workflows/.github/workflows/ci-quality.yml@v1.0.0
    with:
      changeset-check: true
      audit-level: critical
    secrets: inherit
