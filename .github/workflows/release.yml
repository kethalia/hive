name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      packages: write
    outputs:
      published: ${{ steps.changesets.outputs.published }}
      publishedPackages: ${{ steps.changesets.outputs.publishedPackages }}
      orchestratorVersion: ${{ steps.versions.outputs.orchestratorVersion }}
      terminalProxyVersion: ${{ steps.versions.outputs.terminalProxyVersion }}
      authVersion: ${{ steps.versions.outputs.authVersion }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create release Pull Request or publish
        id: changesets
        uses: changesets/action@v1
        with:
          commit: "chore: version packages"
          title: "chore: version packages"
          version: pnpm changeset version
          publish: pnpm ci:release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract published versions
        id: versions
        if: steps.changesets.outputs.published == 'true'
        env:
          PUBLISHED_PACKAGES: ${{ steps.changesets.outputs.publishedPackages }}
        run: |
          ORCHESTRATOR_VERSION=$(echo "$PUBLISHED_PACKAGES" | jq -r '.[] | select(.name == "hive-orchestrator") | .version // empty')
          TERMINAL_PROXY_VERSION=$(echo "$PUBLISHED_PACKAGES" | jq -r '.[] | select(.name == "hive-terminal-proxy") | .version // empty')
          AUTH_VERSION=$(echo "$PUBLISHED_PACKAGES" | jq -r '.[] | select(.name == "hive-auth") | .version // empty')
          echo "orchestratorVersion=${ORCHESTRATOR_VERSION}" >> "$GITHUB_OUTPUT"
          echo "terminalProxyVersion=${TERMINAL_PROXY_VERSION}" >> "$GITHUB_OUTPUT"
          echo "authVersion=${AUTH_VERSION}" >> "$GITHUB_OUTPUT"

  docker-app:
    name: Push hive app image
    needs: [release]
    if: needs.release.outputs.orchestratorVersion != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        env:
          VERSION: ${{ needs.release.outputs.orchestratorVersion }}
          SHA: ${{ github.sha }}
        run: |
          echo "tags<<EOF" >> "$GITHUB_OUTPUT"
          echo "ghcr.io/kethalia/hive:v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "ghcr.io/kethalia/hive:sha-${SHA:0:7}" >> "$GITHUB_OUTPUT"
          echo "ghcr.io/kethalia/hive:latest" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=Hive orchestrator
            org.opencontainers.image.version=${{ needs.release.outputs.orchestratorVersion }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-terminal-proxy:
    name: Push terminal-proxy image
    needs: [release]
    if: needs.release.outputs.terminalProxyVersion != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        env:
          VERSION: ${{ needs.release.outputs.terminalProxyVersion }}
          SHA: ${{ github.sha }}
        run: |
          echo "tags<<EOF" >> "$GITHUB_OUTPUT"
          echo "ghcr.io/kethalia/hive-terminal-proxy:v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "ghcr.io/kethalia/hive-terminal-proxy:sha-${SHA:0:7}" >> "$GITHUB_OUTPUT"
          echo "ghcr.io/kethalia/hive-terminal-proxy:latest" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Build and push terminal-proxy image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/terminal-proxy/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=Hive terminal proxy
            org.opencontainers.image.version=${{ needs.release.outputs.terminalProxyVersion }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-auth:
    name: Push auth service image
    needs: [release]
    if: needs.release.outputs.authVersion != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        env:
          VERSION: ${{ needs.release.outputs.authVersion }}
          SHA: ${{ github.sha }}
        run: |
          echo "tags<<EOF" >> "$GITHUB_OUTPUT"
          echo "ghcr.io/kethalia/hive-auth:v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "ghcr.io/kethalia/hive-auth:sha-${SHA:0:7}" >> "$GITHUB_OUTPUT"
          echo "ghcr.io/kethalia/hive-auth:latest" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Build and push auth image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/auth/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=Hive auth service
            org.opencontainers.image.version=${{ needs.release.outputs.authVersion }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
