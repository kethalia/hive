# Release workflow — promote-on-release retag path.
#
# `release` (push to main): calls the org-reusable retag-stack.yml. That
# reusable runs changesets, then for each `publishedPackages` entry that
# also appears in the `images:` JSON map below, retags the prebuilt
# `:sha-<short>` manifest (produced by build-images.yml on the merge commit)
# to `:v<version>` and `:latest` via `docker buildx imagetools create` — no
# rebuild.
#
# `recovery-publish` (workflow_dispatch): per-image retag entry that calls
# the leaf retag-image.yml reusable directly. Operator supplies the merge
# commit's short SHA (`source-sha-short`) and target version.
name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      images:
        description: 'Comma-separated package names to retag (hive-orchestrator,hive-terminal-proxy,hive-auth)'
        required: true
        type: string
      version:
        description: 'Semver without v prefix (e.g. 0.1.1)'
        required: true
        type: string
      source-sha-short:
        description: 'Short SHA (7 chars) of the merge commit whose :sha-<short> images to retag (e.g. abc1234)'
        required: true
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release:
    if: github.event_name == 'push'
    uses: kethalia/workflows/.github/workflows/retag-stack.yml@v1.0.0
    with:
      images: |
        {
          "hive-orchestrator":   { "image": "hive" },
          "hive-terminal-proxy": { "image": "hive-terminal-proxy" },
          "hive-auth":           { "image": "hive-auth" }
        }
    secrets: inherit

  recovery-expand:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.expand.outputs.matrix }}
    steps:
      - name: Expand images input to matrix
        id: expand
        env:
          IMAGES: ${{ inputs.images }}
        run: |
          set -euo pipefail
          echo "Requested images: $IMAGES"
          include='[]'
          IFS=',' read -ra names <<<"$IMAGES"
          for raw in "${names[@]}"; do
            name="$(echo "$raw" | tr -d '[:space:]')"
            case "$name" in
              hive-orchestrator)
                entry='{"name":"hive-orchestrator","image":"hive"}'
                ;;
              hive-terminal-proxy)
                entry='{"name":"hive-terminal-proxy","image":"hive-terminal-proxy"}'
                ;;
              hive-auth)
                entry='{"name":"hive-auth","image":"hive-auth"}'
                ;;
              "")
                continue
                ;;
              *)
                echo "Unknown image name: $name" >&2
                exit 1
                ;;
            esac
            include=$(jq -c --argjson e "$entry" '. + [$e]' <<<"$include")
          done
          matrix=$(jq -c --argjson inc "$include" -n '{include: $inc}')
          echo "Resolved matrix: $matrix"
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  recovery-publish:
    needs: [recovery-expand]
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.recovery-expand.outputs.matrix) }}
    uses: kethalia/workflows/.github/workflows/retag-image.yml@v1.0.0
    with:
      image: ${{ matrix.image }}
      source-tag: sha-${{ inputs.source-sha-short }}
      dest-tags: |
        v${{ inputs.version }}
        latest
    secrets: inherit
