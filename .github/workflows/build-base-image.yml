name: Build hive-base Docker image

on:
  push:
    branches:
      - main
    paths:
      - "docker/hive-base/**"
      - ".github/workflows/build-base-image.yml"
  pull_request:
    branches:
      - main
    paths:
      - "docker/hive-base/**"
      - ".github/workflows/build-base-image.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: build-hive-base-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-push:
    name: Build, smoke test, and push hive-base image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build locally on all runs (load: true) so smoke tests run against the
      # exact image before anything is pushed to the registry.
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: docker/hive-base
          push: false
          load: true
          platforms: linux/amd64
          tags: ghcr.io/kethalia/hive-base:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test — claude --version
        run: docker run --rm ghcr.io/kethalia/hive-base:${{ github.sha }} claude --version

      - name: Smoke test — notesmd-cli --version
        run: docker run --rm ghcr.io/kethalia/hive-base:${{ github.sha }} notesmd-cli --version

      - name: Smoke test — act --version
        run: docker run --rm ghcr.io/kethalia/hive-base:${{ github.sha }} act --version

      - name: Smoke test — vncserver present
        run: docker run --rm ghcr.io/kethalia/hive-base:${{ github.sha }} which vncserver

      - name: Smoke test — openbox --version
        run: docker run --rm ghcr.io/kethalia/hive-base:${{ github.sha }} openbox --version

      # Tag and push the already-built local image — no rebuild, no network fetches.
      # This guarantees what's in the registry is exactly what passed smoke tests.
      - name: Push image (main only, after smoke tests pass)
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        run: |
          docker tag ghcr.io/kethalia/hive-base:${{ github.sha }} ghcr.io/kethalia/hive-base:latest
          docker push ghcr.io/kethalia/hive-base:${{ github.sha }}
          docker push ghcr.io/kethalia/hive-base:latest
