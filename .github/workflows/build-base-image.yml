name: Build hive-base Docker image

on:
  push:
    branches:
      - main
    paths:
      - "docker/hive-base/**"
  pull_request:
    branches:
      - main
    paths:
      - "docker/hive-base/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-test-push:
    name: Build, smoke test, and push hive-base image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build locally on all runs (load: true) so smoke tests can run against
      # the image before it is ever pushed to the registry.
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: docker/hive-base
          push: false
          load: true
          tags: ghcr.io/kethalia/hive-base:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Smoke tests run against the locally loaded image on every run (PR and main).
      # Push only happens after all tests pass.
      - name: Smoke test — claude --version
        run: docker run --rm ghcr.io/kethalia/hive-base:${{ github.sha }} claude --version

      - name: Smoke test — notesmd-cli --version
        run: docker run --rm ghcr.io/kethalia/hive-base:${{ github.sha }} notesmd-cli --version

      - name: Smoke test — act --version
        run: docker run --rm ghcr.io/kethalia/hive-base:${{ github.sha }} act --version

      - name: Smoke test — vncserver --version
        run: docker run --rm ghcr.io/kethalia/hive-base:${{ github.sha }} vncserver --version

      - name: Smoke test — openbox --version
        run: docker run --rm ghcr.io/kethalia/hive-base:${{ github.sha }} openbox --version

      # Push to GHCR only on main / workflow_dispatch, after smoke tests pass.
      - name: Push image (main only)
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: docker/hive-base
          push: true
          tags: |
            ghcr.io/kethalia/hive-base:latest
            ghcr.io/kethalia/hive-base:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
