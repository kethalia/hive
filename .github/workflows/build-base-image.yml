name: Build hive-base Docker image

on:
  push:
    branches:
      - main
    paths:
      - "docker/hive-base/**"
  pull_request:
    branches:
      - main
    paths:
      - "docker/hive-base/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build and push hive-base image
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/kethalia/hive-base
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,format=long

      # On PRs: build to local Docker daemon for smoke testing (no push)
      - name: Build image (PR — local only)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: docker/hive-base
          push: false
          load: true
          tags: ghcr.io/kethalia/hive-base:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # On main / workflow_dispatch: build and push to GHCR
      - name: Build and push image (main)
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: docker/hive-base
          push: true
          tags: |
            ghcr.io/kethalia/hive-base:latest
            ghcr.io/kethalia/hive-base:${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  smoke-test:
    name: Smoke test hive-base image
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Log in to GHCR (main only, to pull the pushed image)
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx (needed to rebuild on PR for smoke tests)
        if: github.event_name == 'pull_request'
        uses: docker/setup-buildx-action@v3

      - name: Checkout (needed to rebuild on PR)
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v4

      - name: Rebuild image locally for PR smoke tests
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: docker/hive-base
          push: false
          load: true
          tags: ghcr.io/kethalia/hive-base:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Pull image (main — already pushed)
        if: github.event_name != 'pull_request'
        run: docker pull ghcr.io/kethalia/hive-base:${{ github.sha }}

      - name: Smoke test — claude --version
        run: docker run --rm ghcr.io/kethalia/hive-base:${{ github.sha }} claude --version

      - name: Smoke test — notesmd-cli --version
        run: docker run --rm ghcr.io/kethalia/hive-base:${{ github.sha }} notesmd-cli --version

      - name: Smoke test — act --version
        run: docker run --rm ghcr.io/kethalia/hive-base:${{ github.sha }} act --version

      - name: Smoke test — vncserver present
        run: docker run --rm ghcr.io/kethalia/hive-base:${{ github.sha }} which vncserver

      - name: Smoke test — openbox present
        run: docker run --rm ghcr.io/kethalia/hive-base:${{ github.sha }} which openbox
