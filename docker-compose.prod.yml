services:
  auth:
    image: ghcr.io/kethalia/hive-auth:latest
    restart: unless-stopped
    expose:
      - "4400"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-hive}:${POSTGRES_PASSWORD:-hive}@postgres:5432/${POSTGRES_DB:-hive}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - COOKIE_SECRET=${COOKIE_SECRET:-}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4400/health"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    image: ghcr.io/kethalia/hive-web:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-hive}:${POSTGRES_PASSWORD:-hive}@postgres:5432/${POSTGRES_DB:-hive}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-changeme}@redis:6379
      - CODER_URL=${CODER_URL:-}
      - AUTH_SERVICE_URL=http://auth:4400
      - COOKIE_SECRET=${COOKIE_SECRET:-}
      - NEXT_PUBLIC_TERMINAL_WS_URL=${NEXT_PUBLIC_TERMINAL_WS_URL:-}

  terminal-proxy:
    image: ghcr.io/kethalia/hive-terminal:latest
    restart: unless-stopped
    ports:
      - "3001:3001"
    depends_on:
      auth:
        condition: service_healthy
    environment:
      - AUTH_SERVICE_URL=http://auth:4400
      - COOKIE_SECRET=${COOKIE_SECRET:-}

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hive}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hive}
      POSTGRES_DB: ${POSTGRES_DB:-hive}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hive}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
