# System-wide tmux configuration for Hive workspaces.
# tmux reads /etc/tmux.conf before ~/.tmux.conf, so this applies to every
# user and every socket (including the `-L web` socket used by the terminal
# proxy). Per-user ~/.tmux.conf can still override settings below.

# Larger scrollback so resurrect's pane-content capture has something useful.
set -g history-limit 50000

# Plugins live in the image at /opt/tmux-plugins (immutable, no TPM bootstrap
# needed on first boot). Resurrect data is written under ~/.tmux/resurrect,
# which lives on the persistent home volume — so layout survives container
# restarts.

# tmux-resurrect: save & restore session layout + CWD + scrollback.
set -g @resurrect-dir '~/.tmux/resurrect'
set -g @resurrect-capture-pane-contents 'on'
# Restore these processes when their original commands match (saved as the
# command line; resurrect re-runs them on restore). Running state cannot be
# revived — only re-launched. The `~` prefix is a strict match.
set -g @resurrect-processes 'vim nvim emacs nano less more tail watch htop top ssh psql mysql sqlite3 node npm pnpm yarn claude "git log" "~bash" "~zsh"'

# tmux-continuum: auto-save every 5 min, auto-restore on server start.
set -g @continuum-save-interval '5'
set -g @continuum-restore 'on'

# Load plugins directly (no TPM bootstrap). Order matters: resurrect first,
# then continuum (which depends on resurrect).
run-shell /opt/tmux-plugins/tmux-resurrect/resurrect.tmux
run-shell /opt/tmux-plugins/tmux-continuum/continuum.tmux
